apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    app: homeassistant
  namespace: smart-home
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: homeassistant
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      nodeSelector:
        disktype: usb
      volumes:
        - name: homeassistant-config
          persistentVolumeClaim:
            claimName: homeassistant-pvc-config
      hostNetwork: true
      containers:
        - image: ghcr.io/home-assistant/raspberrypi4-64-homeassistant:2026.1.3
          imagePullPolicy: Always
          startupProbe:
            tcpSocket:
              port: 8123
            failureThreshold: 120
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 8123
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          name: homeassistant
          ports:
            - containerPort: 8123
              name: webui
          resources:
            requests:
              cpu: 250m
              memory: 1024Mi
            limits:
              memory: 3072Mi
          stdin: true
          tty: true
          volumeMounts:
            - mountPath: /config
              name: homeassistant-config
      restartPolicy: Always
